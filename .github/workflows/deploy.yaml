name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: '22'

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # 5.0.3
        with:
          path: ~/.local/zig/0.15.2
          key: ${{ runner.os }}-zig-0.15.2

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/zig"
          curl -fL "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" --output /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          mv /tmp/zig-x86_64-linux-0.15.2 "$HOME/.local/zig/0.15.2"

      - name: Add Zig to PATH
        run: echo "$HOME/.local/zig/0.15.2" >> "$GITHUB_PATH"

      - name: Install pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # 5.0.0
        with:
          version: latest
          cache: true

      - name: Cache Eleventy .cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # 5.0.3
        with:
          path: ./.cache
          key: ${{ runner.os }}-eleventy-fetch-cache

      - run: pnpm ci
      - run: pnpm build

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # 4.0.0
        with:
          path: _site/
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # 4.0.5
